name: axiom-official/axiom-databases
version: 0.1.0
language: python
description: Database nodes for executing parameterised SQL queries against a Postgres database.
author: Axiom
license: MIT
nodes:
    - name: SQLQueryNode
      input: QueryRequest
      output: QueryResult
      description: Executes a parameterised SELECT query against a Postgres database and returns the result rows.
      required_secrets:
        - DATABASE_URL
